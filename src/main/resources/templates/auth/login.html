<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zomato - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .auth-container {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.08);
        }
        .logo-area {
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            color: #cb202d; /* Zomato Red */
            margin-bottom: 25px;
        }
        .auth-container h2 {
            margin-bottom: 20px;
            font-weight: 600;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #555;
        }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border 0.3s;
        }
        .form-control:focus {
            border-color: #cb202d;
            outline: none;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #cb202d;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn-submit:hover {
            background-color: #b01b26;
        }
        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .alert-danger {
            background-color: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
        }
        .alert-success {
            background-color: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }
        .redirect-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .redirect-link a {
            color: #cb202d;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="logo-area">
        <i class="fa-solid fa-utensils"></i> Zomato
    </div>
    <h2>Login</h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:if="${param.success}" class="alert alert-success">
        Registration successful! Please login.
    </div>

    <form th:action="@{/login}" method="post" onsubmit="return validateLoginForm()">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="Enter email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-submit">Sign In</button>
    </form>

    <div class="redirect-link">
        Don't have an account? <a th:href="@{/register}">Register here</a>
    </div>
</div>

<script>
    function validateLoginForm() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        if (email === "" || password === "") {
            alert("அனைத்து கட்டங்களையும் நிரப்பவும்!");
            return false;
        }
        return true;
    }
</script>

</body>
</html>

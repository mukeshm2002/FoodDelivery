<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zomato - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .auth-container {
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 35px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.08);
        }
        .logo-area {
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            color: #cb202d;
            margin-bottom: 20px;
        }
        .auth-container h2 {
            margin-bottom: 15px;
            font-weight: 600;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
            color: #555;
        }
        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .form-control:focus {
            border-color: #cb202d;
            outline: none;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #cb202d;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        .btn-submit:hover {
            background-color: #b01b26;
        }
        .alert {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .alert-danger {
            background-color: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
        }
        .redirect-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }
        .redirect-link a {
            color: #cb202d;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="logo-area">
        <i class="fa-solid fa-utensils"></i> Zomato
    </div>
    <h2>Register</h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/register}" th:object="${user}" method="post" onsubmit="return validateRegisterForm()">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="Enter email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" th:field="*{password}" class="form-control" placeholder="Create password" required>
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" id="phone" th:field="*{phone}" class="form-control" placeholder="Enter phone number" required>
        </div>
        <div class="form-group">
            <label>Account Type / Role</label>
            <select th:field="*{role}" class="form-control">
                <option value="CUSTOMER">Customer (உணவு ஆர்டர் செய்ய)</option>
                <option value="RESTAURANT_OWNER">Restaurant Owner (ஹோட்டல் நிர்வாகிக்க)</option>
            </select>
        </div>
        <button type="submit" class="btn-submit">Create Account</button>
    </form>

    <div class="redirect-link">
        Already have an account? <a th:href="@{/login}">Login here</a>
    </div>
</div>

<script>
    function validateRegisterForm() {
        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();

        if (name.length < 3) {
            alert("பெயர் குறைந்தது 3 எழுத்துக்கள் இருக்க வேண்டும்!");
            return false;
        }
        if (isNaN(phone) || phone.length < 10) {
            alert("சரியான 10 இலக்க தொலைபேசி எண்ணை உள்ளிடவும்!");
            return false;
        }
        return true;
    }
</script>

</body>
</html>
